name: Build Android APK

on:
  # Trigger on tag pushes for releases and manual dispatch
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📥 Install dependencies (Clean)
        working-directory: aqualyn-mobile
        run: |
          rm -rf node_modules
          npm install

      - name: ⚙️ Generate Android Project (Expo Prebuild)
        working-directory: aqualyn-mobile
        run: npx expo prebuild --platform android --clean

      - name: 🛠️ Optimize APK Size (R8 Shrinking)
        working-directory: aqualyn-mobile
        run: |
          echo "android.enableProguardInReleaseBuilds=true" >> android/gradle.properties

      - name: 🔨 Build APK
        working-directory: aqualyn-mobile/android
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: |
          ./gradlew clean
          ./gradlew assembleRelease --stacktrace --info

      - name: 📤 Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aqualyn-android-apks
          path: aqualyn-mobile/android/app/build/outputs/apk/release/*.apk

      - name: 🚀 Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: aqualyn-mobile/android/app/build/outputs/apk/release/*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true