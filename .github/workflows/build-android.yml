name: Build Android APK

on:
  # Trigger on tag pushes for releases and manual dispatch
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    # Pinning a fixed OS version blocks GitHub from changing the background environment
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 💾 Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 📥 Install dependencies
        working-directory: aqualyn-mobile
        # 'npm ci' completely locks dependencies to your package-lock.json (no overnight updates)
        run: |
          rm -rf node_modules
          npm ci

      - name: ⚙️ Generate Android Project (Expo Prebuild)
        working-directory: aqualyn-mobile
        run: npx expo prebuild --platform android --clean

      - name: ✂️ Configure Separate APK Builds (ABI Splits)
        working-directory: aqualyn-mobile/android/app
        # Dynamically changes the generated build.gradle to compile separate split APKs
        run: |
          sed -i 's/def enableSeparateBuildPerCPUArchitecture = false/def enableSeparateBuildPerCPUArchitecture = true/g' build.gradle

      - name: 🔨 Build APK
        working-directory: aqualyn-mobile/android
        # Explicit memory caps and sequential compiling stops silent memory crashes completely
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.parallel=false -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=512m"

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aqualyn-android-apks
          path: aqualyn-mobile/android/app/build/outputs/apk/release/*.apk

      - name: 🚀 Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: aqualyn-mobile/android/app/build/outputs/apk/release/*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true