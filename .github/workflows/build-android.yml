name: Build Android APK

on:
  # Trigger on tag pushes for releases and manual dispatch
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# GRANT WRITE PERMISSIONS FOR THE RUNNER TO CREATE RELEASES 👇
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Upgraded to 22 to fix deprecation alerts safely

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 💾 Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 📥 Install dependencies
        working-directory: aqualyn-mobile
        run: |
          rm -rf node_modules
          npm ci

      - name: ⚙️ Generate Android Project (Expo Prebuild)
        working-directory: aqualyn-mobile
        run: npx expo prebuild --platform android --clean

      # FORCE ABI SPLITS DIRECTLY INSIDE THE GRADLE CONFIGURATION 👇
      - name: ✂️ Configure Separate APK Builds (ABI Splits)
        working-directory: aqualyn-mobile/android/app
        run: |
          sed -i 's/enableSeparateBuildPerCPUArchitecture = false/enableSeparateBuildPerCPUArchitecture = true/g' build.gradle

      - name: 🔨 Build APK
        working-directory: aqualyn-mobile/android
        # Fixed Metaspace capacity and excluded memory-hogging lint execution entirely
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Dorg.gradle.parallel=false \
            -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=1024m" \
            -x lintVitalAnalyzeRelease

      - name: 📤 Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aqualyn-android-apks
          path: aqualyn-mobile/android/app/build/outputs/apk/release/*.apk

      - name: 🚀 Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2 # Upgraded to v2 for full Node 22 compatibility
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: aqualyn-mobile/android/app/build/outputs/apk/release/*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true