name: Build Android APK

on:
  # Trigger on tag pushes for releases and manual dispatch
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📥 Install dependencies
        working-directory: aqualyn-mobile
        run: npm install

      - name: ⚙️ Generate Android Project (Expo Prebuild)
        working-directory: aqualyn-mobile
        run: npx expo prebuild --platform android --clean

      - name: 🔨 Build APK
        working-directory: aqualyn-mobile/android
        run: ./gradlew assembleRelease

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aqualyn-android-apk
          path: aqualyn-mobile/android/app/build/outputs/apk/release/app-release.apk

      - name: 🚀 Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
           files: aqualyn-mobile/android/app/build/outputs/apk/release/app-release.apk
           token: ${{ secrets.GITHUB_TOKEN }}
           generate_release_notes: true
