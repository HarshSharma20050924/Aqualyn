services:
  postgres:
    image: postgres:15-alpine
    container_name: aqualyn-db
    restart: always
    environment:
      POSTGRES_USER: aqualyn_user
      POSTGRES_PASSWORD: aqualyn_password
      POSTGRES_DB: aqualyn_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aqualyn-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
